global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Docker service discovery: any container with the label
  # prometheus.io/scrape=true is picked up automatically, and scraped
  # on the port given by prometheus.io/port. No restart needed to add
  # a new target -- just start a container with those labels.
  - job_name: docker-sd
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_io_scrape]
        regex: "true"
        action: keep
      - source_labels: [__meta_docker_container_label_prometheus_io_port]
        target_label: __tmp_port
      - source_labels: [__meta_docker_network_ip, __tmp_port]
        separator: ":"
        target_label: __address__
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: instance
      - source_labels: [__meta_docker_container_label_prometheus_io_job]
        target_label: job
