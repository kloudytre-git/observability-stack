global:
  resolve_timeout: 5m
  # Uncomment and fill in to enable email notifications.
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'REPLACE_ME'
  # smtp_auth_password: 'REPLACE_ME'

route:
  receiver: default
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical

receivers:
